<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aldorei Apps — Bespoke Tools for the DnD Table</title>
  <meta name="description" content="Aldorei Apps builds bespoke software for the tabletop RPG table. Explore NPC-Net, ConductorSBN, and more — tools born from real sessions." />
  <meta name="theme-color" content="#080706" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Aldorei Apps" />
  <meta property="og:description" content="Bespoke tools for the DnD table. NPC generation, session music mixing, and more." />
  <meta property="og:site_name" content="Aldorei Apps" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Aldorei Apps" />
  <meta name="twitter:description" content="Bespoke tools for the DnD table. NPC generation, session music mixing, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080706;
      --surface:  #100F0D;
      --border:   #2A2620;
      --parchment:#C9B882;
      --gold:     #8B6F3A;
      --dim:      #6A6055;
      --text:     #E4DDD0;
      --muted:    #9A8E80;
      --font-display: 'Cinzel', serif;
      --font-body:    'Crimson Pro', Georgia, serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 9999;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); }

    /* ===== ORNAMENTAL DIVIDER ===== */
    .ornament {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--gold);
      opacity: 0.6;
    }
    .ornament::before,
    .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament::after {
      background: linear-gradient(270deg, transparent, var(--gold));
    }
    .ornament svg { flex-shrink: 0; }

    /* ===== CORNER FRAME ===== */
    .corner-frame {
      position: relative;
    }
    .corner-frame::before,
    .corner-frame::after,
    .corner-frame .cf-b::before,
    .corner-frame .cf-b::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--parchment);
      border-style: solid;
      opacity: 0.35;
    }
    .corner-frame::before  { top: 0; left: 0;  border-width: 1px 0 0 1px; }
    .corner-frame::after   { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .corner-frame .cf-b::before { bottom: 0; left: 0;  border-width: 0 0 1px 1px; }
    .corner-frame .cf-b::after  { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    /* ===== NAV ===== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: linear-gradient(180deg, rgba(8,7,6,0.95) 0%, transparent 100%);
      backdrop-filter: blur(2px);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 15px;
      letter-spacing: 0.25em;
      color: var(--parchment);
      text-decoration: none;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo-mark {
      width: 28px;
      height: 28px;
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--gold);
      transform: rotate(45deg);
    }
    .nav-logo-mark span { transform: rotate(-45deg); display: block; }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--parchment); }

    /* ===== HERO ===== */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 120px 48px 80px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(139,111,58,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,184,130,0.04) 0%, transparent 60%);
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(52px, 8vw, 110px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-align: center;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 80px rgba(201,184,130,0.15);
      margin-bottom: 8px;
    }

    .hero-subtitle {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 20px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 60px;
      text-align: center;
    }

    /* ===== HERO PROJECT PREVIEW ===== */
    .hero-preview {
      width: 100%;
      max-width: 860px;
      position: relative;
    }

    .project-switcher {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .switcher-dot {
      width: 6px;
      height: 6px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
      cursor: pointer;
      transition: background 0.3s;
      background: transparent;
    }
    .switcher-dot.active { background: var(--gold); }

    .featured-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 48px;
      cursor: pointer;
      transition: border-color 0.4s;
      overflow: hidden;
    }
    .featured-card:hover { border-color: var(--gold); }

    .featured-card-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 80% 50%, rgba(139,111,58,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .featured-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .featured-tag::before {
      content: '◆';
      font-size: 7px;
    }

    .featured-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 600;
      color: var(--parchment);
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }

    .featured-desc {
      font-size: 17px;
      color: var(--muted);
      font-style: italic;
      max-width: 520px;
      margin-bottom: 32px;
      line-height: 1.65;
    }

    .featured-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn-primary {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--parchment);
      padding: 13px 28px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      display: inline-block;
    }
    .btn-primary:hover { background: #E8D9AC; transform: translateY(-1px); }

    .btn-ghost {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 12px 24px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
      display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--parchment); color: var(--parchment); }

    .featured-nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: border-color 0.3s, color 0.3s;
    }
    .featured-nav-arrow:hover { border-color: var(--gold); color: var(--parchment); }
    .featured-nav-arrow.prev { left: -56px; }
    .featured-nav-arrow.next { right: -56px; }

    .featured-index {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--dim);
      position: absolute;
      bottom: 48px;
      right: 48px;
      letter-spacing: 0.15em;
    }

    .fade-enter { animation: fadeSlide 0.5s ease forwards; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== SCROLL HINT ===== */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: breathe 3s ease-in-out infinite;
    }
    .scroll-hint-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(180deg, var(--gold) 0%, transparent 100%);
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* ===== SECTION COMMON ===== */
    section {
      padding: 100px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 64px;
    }

    .section-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .section-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      opacity: 0.5;
      width: 200px;
    }
    .section-rule::before, .section-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
    }
    .section-rule-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ===== PROJECTS GRID ===== */
    #projects { padding-top: 0; }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .project-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 32px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.4s;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .project-card:hover { border-color: rgba(201,184,130,0.35); }

    .project-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(8,7,6,0.85) 100%);
      pointer-events: none;
    }

    .project-card-bg {
      position: absolute;
      inset: 0;
      opacity: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(139,111,58,0.1) 0%, transparent 70%);
      transition: opacity 0.5s;
    }
    .project-card:hover .project-card-bg { opacity: 1; }

    .project-card-content {
      position: relative;
      z-index: 2;
    }

    .project-card-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .project-card-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 500;
      color: var(--parchment);
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .project-card-desc {
      font-size: 15px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease, opacity 0.4s;
      opacity: 0;
    }
    .project-card:hover .project-card-desc {
      max-height: 100px;
      opacity: 1;
    }

    .project-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
      margin-top: 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s 0.1s, transform 0.4s 0.1s;
    }
    .project-card:hover .project-card-cta {
      opacity: 1;
      transform: translateY(0);
    }
    .project-card-cta::after {
      content: '→';
      transition: transform 0.3s;
    }
    .project-card:hover .project-card-cta::after { transform: translateX(4px); }

    .project-card.featured-large {
      grid-column: span 2;
      min-height: 340px;
    }

    /* Placeholder art area */
    .project-art {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--border);
      text-transform: uppercase;
    }
    .project-art-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
    }

    /* ===== PATREON SECTION ===== */
    #patreon {
      padding: 0 48px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .patreon-inner {
      border: 1px solid var(--border);
      position: relative;
      padding: 64px 80px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 64px;
      align-items: center;
      overflow: hidden;
    }

    .patreon-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 90% 50%, rgba(139,111,58,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .patreon-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .patreon-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 2.5vw, 34px);
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.06em;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .patreon-desc {
      font-size: 17px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.7;
      max-width: 480px;
    }

    .patreon-cta-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .patreon-tiers {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 200px;
      margin-bottom: 8px;
    }

    .patreon-tier {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .patreon-tier.highlight {
      border-color: var(--gold);
      color: var(--parchment);
    }

    .patreon-tier-price {
      color: var(--gold);
    }

    .btn-patreon {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--gold);
      padding: 14px 32px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      width: 200px;
      text-align: center;
      display: block;
    }
    .btn-patreon:hover { background: var(--parchment); }

    /* ===== PATREON POSTS CAROUSEL ===== */
    .posts-carousel {
      margin-top: 64px;
      position: relative;
    }
    .posts-track-wrap {
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }
    .posts-track-wrap:active { cursor: grabbing; }
    .posts-track {
      display: flex;
      gap: 16px;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .post-card {
      flex-shrink: 0;
      width: calc(33.333% - 11px);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px 28px 24px;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    @media (max-width: 900px) {
      .post-card { width: calc(85% - 8px); }
    }
    .post-card:hover { border-color: rgba(201,184,130,0.3); }
    .post-card-tier {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.7;
    }
    .post-card-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
      color: var(--parchment);
      letter-spacing: 0.04em;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .post-card-excerpt {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .post-card-date {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--dim);
    }
    .post-card-link {
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .post-card:hover .post-card-link { opacity: 1; }
    .posts-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .posts-nav {
      display: flex;
      gap: 8px;
    }
    .posts-nav-btn {
      width: 36px;
      height: 36px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: border-color 0.3s, color 0.3s;
    }
    .posts-nav-btn:hover { border-color: var(--gold); color: var(--parchment); }
    .posts-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .posts-progress {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .posts-pip {
      width: 4px;
      height: 4px;
      background: var(--border);
      transform: rotate(45deg);
      transition: background 0.3s;
      cursor: pointer;
    }
    .posts-pip.active { background: var(--gold); }

    /* ===== ABOUT STRIP ===== */
    #about {

    .cursor-ring {

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#C9B882",
  "bgDarkness": "default",

// ─── CUSTOM CURSOR ───────────────────────────────────────────────────────────
function CustomCursor() {
  const dotRef  = useRef(null);
  const ringRef = useRef(null);
  const pos     = useRef({ x: -100, y: -100 });
  const ring    = useRef({ x: -100, y: -100 });
  const rafRef  = useRef(null);

  useEffect(() => {
    const move = (e) => { pos.current = { x: e.clientX, y: e.clientY }; };
    window.addEventListener('mousemove', move);

    const loop = () => {
      ring.current.x += (pos.current.x - ring.current.x) * 0.12;
      ring.current.y += (pos.current.y - ring.current.y) * 0.12;
      if (dotRef.current)  { dotRef.current.style.left  = pos.current.x + 'px'; dotRef.current.style.top  = pos.current.y + 'px'; }
      if (ringRef.current) { ringRef.current.style.left = ring.current.x + 'px'; ringRef.current.style.top = ring.current.y + 'px'; }
      rafRef.current = requestAnimationFrame(loop);
    };
    loop();

    const over = (e) => { if (e.target.closest('a,button,.project-card,.switcher-dot,canvas')) ringRef.current && ringRef.current.classList.add('expanded'); };
    const out  = ()  => { ringRef.current && ringRef.current.classList.remove('expanded'); };
    window.addEventListener('mouseover', over);
    window.addEventListener('mouseout',  out);

    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseover', over);
      window.removeEventListener('mouseout',  out);
    };
  }, []);

  return (
    <>
      <div ref={dotRef}  className="cursor-dot"  />
      <div ref={ringRef} className="cursor-ring" />
    </>
  );
}

// ─── CONSTELLATION CANVAS ─────────────────────────────────────────────────────
const NODE_POSITIONS = [
  { x: 0.14, y: 0.16, idx: 0, label: 'NPC-Net' },
  { x: 0.84, y: 0.13, idx: 1, label: 'ConductorSBN' },
  { x: 0.50, y: 0.08, idx: 2, label: 'Coming Soon' },
  { x: 0.25, y: 0.52, idx: 3, label: 'Coming Soon' },
  { x: 0.75, y: 0.48, idx: 4, label: 'Coming Soon' },
];
const EDGES = [[0,2],[2,1],[0,3],[1,4],[3,4],[0,1]];

function ConstellationCanvas({ activeIndex, onNodeClick, onNodeHover }) {
  const canvasRef = useRef(null);
  const mouse     = useRef({ x: 0.5, y: 0.5 });
  const hovered   = useRef(-1);
  const rafRef    = useRef(null);
  const tRef      = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx    = canvas.getContext('2d');

    const resize = () => { canvas.width = canvas.offsetWidth * devicePixelRatio; canvas.height = canvas.offsetHeight * devicePixelRatio; ctx.scale(devicePixelRatio, devicePixelRatio); };
    resize();
    window.addEventListener('resize', resize);

    // Drift stars
    const stars = Array.from({ length: 90 }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.1 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.004 + 0.001,
    }));

    const draw = () => {
      tRef.current += 1;
      const t  = tRef.current;
      const W  = canvas.offsetWidth;
      const H  = canvas.offsetHeight;
      const mx = mouse.current.x;
      const my = mouse.current.y;
      const px = (mx - 0.5) * 28;
      const py = (my - 0.5) * 14;

      ctx.clearRect(0, 0, W, H);

      // Stars
      stars.forEach(s => {
        s.phase += s.speed;
        const alpha = 0.12 + Math.sin(s.phase) * 0.1;
        ctx.beginPath();
        ctx.arc(s.x * W + px * 0.25, s.y * H + py * 0.25, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,184,130,${alpha})`;
        ctx.fill();
      });

      // Edges
      EDGES.forEach(([a, b]) => {
        const na = NODE_POSITIONS[a], nb = NODE_POSITIONS[b];
        const isLit = a === activeIndex || b === activeIndex;
        ctx.beginPath();
        ctx.moveTo(na.x * W + px, na.y * H + py);
        ctx.lineTo(nb.x * W + px, nb.y * H + py);
        ctx.strokeStyle = isLit ? 'rgba(139,111,58,0.38)' : 'rgba(139,111,58,0.12)';
        ctx.lineWidth   = isLit ? 1 : 0.5;
        ctx.stroke();
      });

      // Nodes
      NODE_POSITIONS.forEach((node, i) => {
        const x       = node.x * W + px;
        const y       = node.y * H + py;
        const isAct   = i === activeIndex;
        const isHov   = i === hovered.current;
        const pulse   = Math.sin(t * 0.025 + i * 1.3) * 0.5 + 0.5;

        // Glow halo (active only)
        if (isAct) {
          const grad = ctx.createRadialGradient(x, y, 0, x, y, 40 + pulse * 12);
          grad.addColorStop(0, 'rgba(201,184,130,0.18)');
          grad.addColorStop(1, 'rgba(201,184,130,0)');
          ctx.beginPath();
          ctx.arc(x, y, 40 + pulse * 12, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }

        // Outer pulse ring
        ctx.beginPath();
        ctx.arc(x, y, (isAct ? 14 : 8) + pulse * 4, 0, Math.PI * 2);
        ctx.strokeStyle = isAct
          ? `rgba(201,184,130,${0.35 + pulse * 0.25})`
          : isHov
            ? `rgba(201,184,130,0.4)`
            : `rgba(139,111,58,0.2)`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Inner ring
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.strokeStyle = isAct ? 'rgba(201,184,130,0.9)' : 'rgba(139,111,58,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Center dot
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = isAct ? '#C9B882' : (isHov ? 'rgba(201,184,130,0.7)' : 'rgba(139,111,58,0.5)');
        ctx.fill();

        // Label
        if (isAct || isHov) {
          ctx.font         = '10px "JetBrains Mono"';
          ctx.fillStyle    = isAct ? 'rgba(201,184,130,0.95)' : 'rgba(201,184,130,0.6)';
          ctx.letterSpacing = '1px';
          const lx = x + 18;
          const ly = y + 4;
          ctx.fillText(node.label.toUpperCase(), lx, ly);
        }
      });

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();

    return () => { cancelAnimationFrame(rafRef.current); window.removeEventListener('resize', resize); };
  }, [activeIndex]);

  const toLocal = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };

  const hitTest = (lx, ly) => {
    const W  = canvasRef.current.offsetWidth;
    const H  = canvasRef.current.offsetHeight;
    const px = (mouse.current.x - 0.5) * 28;
    const py = (mouse.current.y - 0.5) * 14;
    for (let i = 0; i < NODE_POSITIONS.length; i++) {
      const n  = NODE_POSITIONS[i];
      const nx = n.x * W + px;
      const ny = n.y * H + py;
      if (Math.hypot(lx - nx, ly - ny) < 22) return i;
    }
    return -1;
  };

  const onMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    mouse.current = { x: (e.clientX - rect.left) / rect.width, y: (e.clientY - rect.top) / rect.height };
    const { x, y } = toLocal(e);
    const hit = hitTest(x, y);
    hovered.current = hit;
    if (onNodeHover) onNodeHover(hit);
  };

  const onClick = (e) => {
    const { x, y } = toLocal(e);
    const hit = hitTest(x, y);
    if (hit >= 0 && onNodeClick) onNodeClick(hit);
  };

  return (
    <canvas
      ref={canvasRef}
      style={{ position:'absolute', inset:0, width:'100%', height:'100%', display:'block' }}
      onMouseMove={onMouseMove}
      onClick={onClick}
    />
  );
}

      <svg width="14" height="14" viewBox="0 0 14 14">

}

}

// ─── HERO SECTION ─────────────────────────────────────────────────────────────
function HeroSection({ tweaks }) {
  const [active, setActive] = useState(0);
  const [animKey, setAnimKey] = useState(0);
  const [hoveredNode, setHoveredNode] = useState(-1);
  const timerRef = useRef(null);

  const go = useCallback((idx) => { setActive(idx); setAnimKey(k => k + 1); }, []);
  const prev = () => go((active - 1 + PROJECTS.length) % PROJECTS.length);
  const next = () => go((active + 1) % PROJECTS.length);

  useEffect(() => {
    if (!tweaks.autoAdvance) return;
    timerRef.current = setInterval(() => { setActive(a => (a + 1) % PROJECTS.length); setAnimKey(k => k + 1); }, 5500);
    return () => clearInterval(timerRef.current);
  }, [tweaks.autoAdvance]);

  const p = PROJECTS[active];

  return (
    <section id="hero" style={{ maxWidth:'100%', padding:0, minHeight:'100vh', position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>

      {/* Constellation canvas — full-bleed behind everything */}
      <div className="hero-canvas-wrap">
        <ConstellationCanvas
          activeIndex={active}
          onNodeClick={(i) => go(i)}

// ─── POSTS CAROUSEL ───────────────────────────────────────────────────────────
function PostsCarousel() {
  const [offset, setOffset] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [dragStart, setDragStart] = useState(null);
  const [dragDelta, setDragDelta] = useState(0);
  const trackRef = useRef(null);

  const visibleCount = () => window.innerWidth <= 900 ? 1 : 3;
  const maxOffset = PATREON_POSTS.length - visibleCount();

  const canPrev = offset > 0;
  const canNext = offset < maxOffset;

  const prev = () => setOffset(o => Math.max(0, o - 1));
  const next = () => setOffset(o => Math.min(maxOffset, o + 1));

  const onPointerDown = (e) => {
    setDragging(true);
    setDragStart(e.clientX);
    setDragDelta(0);
    trackRef.current.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging) return;
    setDragDelta(e.clientX - dragStart);
  };
  const onPointerUp = () => {
    if (!dragging) return;
    setDragging(false);
    if (dragDelta < -60) next();
    else if (dragDelta > 60) prev();
    setDragDelta(0);
    setDragStart(null);
  };

  const cardW = trackRef.current
    ? trackRef.current.offsetWidth / visibleCount() + 16 / visibleCount()
    : 0;

  const translateX = -(offset * (cardW || 340)) + (dragging ? dragDelta : 0);

  return (
    <div className="posts-carousel reveal">
      <div className="posts-controls">
        <div>
          <p className="section-eyebrow" style={{ marginBottom:0 }}>From the Workshop</p>
        </div>
        <div style={{ display:'flex', gap:'16px', alignItems:'center' }}>
          <div className="posts-progress">
            {PATREON_POSTS.map((_, i) => (
              <div key={i} className={`posts-pip${i === offset ? ' active' : ''}`} onClick={() => setOffset(Math.min(i, maxOffset))} />
            ))}
          </div>
          <div className="posts-nav">
            <button className="posts-nav-btn" onClick={prev} disabled={!canPrev}>&#8249;</button>
            <button className="posts-nav-btn" onClick={next} disabled={!canNext}>&#8250;</button>
          </div>
        </div>
      </div>

      <div
        className="posts-track-wrap"
        ref={trackRef}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
      >
        <div
          className="posts-track"
          style={{
            transform: `translateX(${translateX}px)`,
            transition: dragging ? 'none' : 'transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94)',
          }}
        >
          {PATREON_POSTS.map((post, i) => (
            <div key={i} className="post-card">
              <p className="post-card-tier">{post.tier}</p>
              <h4 className="post-card-title">{post.title}</h4>
              <p className="post-card-excerpt">{post.excerpt}</p>
              <div className="post-card-meta">
                <span className="post-card-date">{post.date}</span>
                <a href={post.url} className="post-card-link" target="_blank" rel="noopener">Read &#8594;</a>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
